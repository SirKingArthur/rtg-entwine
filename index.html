<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Trait Generator</title>
  <style>
    body {
      background: #d8b6c5;
      margin: 0;
      padding: 20px;
      font-family: 'Comic Sans MS', cursive;
      font-size: 16px;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
      background: #e6d6e8;
      border: 2px solid #800080;
      padding: 15px;
    }
    h1 {
      margin: 0 0 5px;
      text-align: center;
      font-style: italic;
      font-size: 24px;
    }
    p.subtitle {
      margin: 0 0 10px;
      text-align: center;
      font-style: italic;
      font-size: 14px;
    }
    .icons {
      text-align: center;
      font-size: 32px;
      margin: 10px 0;
    }
    .main {
      display: flex;
    }
    .buttons {
      flex: 0 0 140px;
    }
    .buttons button {
      display: block;
      width: 140px;
      margin: 4px 0;
      padding: 5px 10px;
      background: #ffffe0;
      border: 2px solid #800080;
      text-align: left;
      font-style: italic;
      cursor: pointer;
    }
    .btn-indent {
      margin-left: 20px;
      width: 110px;
    }
    .results {
      flex: 1;
      padding-left: 20px;
      text-align: center;
      font-style: italic;
    }
    .results div {
      margin: 6px 0;
    }
    .divider {
      border-top: 2px solid #800080;
      margin: 20px 0;
    }
    .final-section {
      text-align: center;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div id="story">
  <p><span id="desc"></span>
     <!--this part is where the "change person" button goes-->
     <span id="person"></span>
     <span id="hair"></span>
     <span id="eyes"></span></p>
  <ul>
     <li id="food"></li>
     <li id="thing"></li>
  </ul>
  </div>
  <script src="script.js"></script>
</body>
</html>
